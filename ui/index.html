<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demiurge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
    --border: #2e2e3e; --text: #e8e8f0; --text2: #888899;
    --primary: #7c6af7; --accent: #f7a26a; --danger: #f76a6a;
    --green: #6af7a2;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Topbar */
  .topbar { display:flex; align-items:center; gap:12px; padding:8px 16px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .topbar h1 { font-size:15px; font-weight:700; background:linear-gradient(135deg,var(--primary),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .project-name { background:none; border:none; border-bottom:1px solid var(--border); color:var(--text); font-size:13px; padding:2px 6px; outline:none; width:180px; }
  .project-name:focus { border-color:var(--primary); }
  .topbar-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; transition:all .15s; }
  .btn:hover { border-color:var(--primary); color:var(--primary); }
  .btn-primary { background:var(--primary); border-color:var(--primary); color:#fff; }
  .btn-primary:hover { background:#9080ff; border-color:#9080ff; color:#fff; }

  /* Tabs */
  .tabs { display:flex; gap:2px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab { padding:7px 16px; font-size:12px; cursor:pointer; color:var(--text2); border-bottom:2px solid transparent; transition:all .15s; user-select:none; }
  .tab.active { color:var(--primary); border-bottom-color:var(--primary); }
  .tab:hover:not(.active) { color:var(--text); }

  /* Pages */
  .page { display:none; flex:1; overflow:hidden; }
  .page.active { display:flex; }

  /* ── Requirements Page ── */
  .panel-board { width:340px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); }
  .panel-header { padding:9px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .panel-header span { font-weight:600; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
  .card-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; position:relative; border-left:3px solid transparent; }
  .card[data-type="feature"] { border-left-color:var(--primary); background:#7c6af712; }
  .card[data-type="ui"]      { border-left-color:var(--accent);  background:#f7a26a12; }
  .card[data-type="data"]    { border-left-color:var(--green);   background:#6af7c412; }
  .card[data-type="flow"]    { border-left-color:#f76a9a;        background:#f76a9a12; }
  .card[data-type="constraint"] { border-left-color:#888;        background:#88888812; }
  .card-type-tag { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text2); margin-bottom:3px; }
  .card-title { font-weight:600; font-size:13px; margin-bottom:2px; }
  .card-desc { font-size:11px; color:var(--text2); line-height:1.4; }
  .card-actions { position:absolute; top:8px; right:8px; display:none; gap:4px; }
  .card:hover .card-actions { display:flex; }
  .card-btn { background:var(--surface); border:1px solid var(--border); color:var(--text2); border-radius:4px; padding:2px 6px; cursor:pointer; font-size:10px; }
  .card-btn.del:hover { color:var(--danger); border-color:var(--danger); }
  .add-card-area { padding:10px; border-top:1px solid var(--border); }
  .add-card-form { display:none; flex-direction:column; gap:6px; }
  .add-card-form.open { display:flex; }
  .form-row { display:flex; gap:6px; }
  .inp { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:5px; font-size:12px; outline:none; width:100%; }
  .inp:focus { border-color:var(--primary); }
  select.inp { cursor:pointer; }
  textarea.inp { resize:vertical; min-height:52px; font-family:inherit; }
  .panel-spec { flex:1; display:flex; flex-direction:column; border-right:1px solid var(--border); }
  .spec-body { flex:1; overflow-y:auto; padding:20px 24px; }
  .spec-body pre { font-family:'Menlo','Monaco',monospace; font-size:12px; line-height:1.6; color:var(--text); white-space:pre-wrap; word-break:break-word; }
  .spec-placeholder { color:var(--text2); font-size:13px; text-align:center; margin-top:60px; line-height:1.8; }
  .spec-generating { color:var(--primary); font-size:13px; text-align:center; margin-top:60px; }
  .panel-export { width:220px; flex-shrink:0; display:flex; flex-direction:column; background:var(--surface); }
  .export-body { flex:1; padding:14px; display:flex; flex-direction:column; gap:10px; }
  .export-section { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
  .export-btn { display:flex; flex-direction:column; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; cursor:pointer; text-align:left; gap:2px; transition:border-color .15s; }
  .export-btn:hover { border-color:var(--primary); }
  .export-btn strong { font-size:12px; color:var(--text); }
  .export-btn small { font-size:10px; color:var(--text2); }
  .stat-row { display:flex; justify-content:space-between; font-size:11px; color:var(--text2); padding:3px 0; border-bottom:1px solid var(--border); }
  .stat-row span:last-child { color:var(--text); font-weight:600; }

  /* ── Wireframe Page ── */
  .wf-palette { width:130px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; padding:10px 8px; gap:6px; }
  .wf-palette-label { font-size:10px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.6px; padding:4px 4px 2px; }
  .wf-item { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:7px 8px; cursor:grab; font-size:11px; color:var(--text); user-select:none; display:flex; align-items:center; gap:6px; transition:border-color .15s; }
  .wf-item:hover { border-color:var(--primary); color:var(--primary); }
  .wf-item:active { cursor:grabbing; }
  .wf-canvas-wrap { flex:1; overflow:auto; background:var(--bg); position:relative; }
  .wf-canvas { position:relative; min-width:900px; min-height:700px; width:100%; height:100%;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 20px 20px; background-position: -1px -1px; }
  .wf-el { position:absolute; background:#ffffff08; border:1.5px solid #555570; border-radius:4px; cursor:move; user-select:none; display:flex; align-items:center; justify-content:center; min-width:40px; min-height:24px; }
  .wf-el.selected { border-color:var(--primary); box-shadow:0 0 0 1px var(--primary); }
  .wf-el-label { font-size:11px; color:#aaa; pointer-events:none; text-align:center; padding:4px; overflow:hidden; white-space:pre-wrap; word-break:break-all; }
  .wf-el[data-type="header"]  { background:#7c6af718; border-color:#7c6af7aa; }
  .wf-el[data-type="nav"]     { background:#7c6af718; border-color:#7c6af7aa; }
  .wf-el[data-type="button"]  { background:#f7a26a18; border-color:#f7a26aaa; border-radius:6px; }
  .wf-el[data-type="input"]   { background:#1a1a2a; border-color:#555570; border-radius:4px; }
  .wf-el[data-type="image"]   { background:#22222f; border-color:#555570; }
  .wf-el[data-type="card"]    { background:#22222f; border-color:#555570; border-radius:8px; }

  /* Resize handle */
  .wf-handle { position:absolute; width:8px; height:8px; background:var(--primary); border-radius:2px; z-index:10; }
  .wf-handle.se { right:-4px; bottom:-4px; cursor:se-resize; }
  .wf-handle.e  { right:-4px; top:50%; transform:translateY(-50%); cursor:e-resize; }
  .wf-handle.s  { bottom:-4px; left:50%; transform:translateX(-50%); cursor:s-resize; }

  .wf-toolbar { display:flex; gap:6px; padding:8px 12px; background:var(--surface); border-bottom:1px solid var(--border); align-items:center; flex-shrink:0; }
  .wf-hint { font-size:11px; color:var(--text2); margin-left:auto; }

  /* ── Project Panel ── */
  .proj-overlay { position:fixed; inset:0; z-index:199; display:none; }
  .proj-overlay.open { display:block; }
  .proj-panel { position:fixed; top:42px; left:12px; width:248px; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:0 10px 36px #00000090; z-index:200; display:none; flex-direction:column; overflow:hidden; }
  .proj-panel.open { display:flex; }
  .proj-panel-head { display:flex; align-items:center; padding:9px 12px; border-bottom:1px solid var(--border); font-size:10px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.7px; }
  .proj-new-btn { margin-left:auto; background:var(--primary); border:none; color:#fff; padding:3px 9px; border-radius:4px; cursor:pointer; font-size:11px; }
  .proj-new-btn:hover { background:#9080ff; }
  .proj-list { max-height:340px; overflow-y:auto; }
  .proj-item { display:flex; align-items:center; padding:8px 12px; cursor:pointer; gap:8px; border-bottom:1px solid #ffffff08; transition:background .1s; }
  .proj-item:hover { background:var(--surface2); }
  .proj-item.current { background:#7c6af710; }
  .proj-dot { width:6px; height:6px; border-radius:50%; background:var(--border); flex-shrink:0; transition:background .15s; }
  .proj-item.current .proj-dot { background:var(--primary); }
  .proj-item-name { flex:1; font-size:12px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .proj-item.current .proj-item-name { color:var(--primary); font-weight:600; }
  .proj-del { font-size:10px; color:var(--text2); background:none; border:1px solid transparent; border-radius:3px; padding:2px 6px; cursor:pointer; opacity:0; flex-shrink:0; }
  .proj-item:hover .proj-del { opacity:1; }
  .proj-del:hover { color:var(--danger) !important; border-color:var(--danger) !important; }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚗ Demiurge</h1>
  <button class="btn" id="proj-toggle" onclick="toggleProjectPanel()" style="font-size:11px;flex-shrink:0;">Projects ▾</button>
  <input class="project-name" id="project-name" placeholder="项目名称...">
  <div class="topbar-right">
    <button class="btn" onclick="saveAll()">Save</button>
    <button class="btn btn-primary" id="main-action-btn" onclick="generateSpec()">✦ Generate Spec</button>
  </div>
</div>

<!-- project panel -->
<div class="proj-overlay" id="proj-overlay" onclick="closeProjectPanel()"></div>
<div class="proj-panel" id="proj-panel">
  <div class="proj-panel-head">
    <span>项目列表</span>
    <button class="proj-new-btn" onclick="newProject()">＋ 新建</button>
  </div>
  <div class="proj-list" id="proj-list">
    <div style="padding:12px;color:var(--text2);font-size:12px;">加载中…</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('req')">需求画板</div>
  <div class="tab" onclick="switchTab('wf')">线框图</div>
</div>

<!-- ── Requirements Page ── -->
<div class="page active" id="page-req">
  <div class="panel-board">
    <div class="panel-header">
      <span>需求画板</span>
      <button class="btn" style="margin-left:auto;font-size:11px;" onclick="toggleAddForm()">＋ 添加</button>
    </div>
    <div class="card-list" id="card-list"></div>
    <div class="add-card-area">
      <div class="add-card-form" id="add-form">
        <input class="inp" id="f-title" placeholder="标题 *" onkeydown="if(event.key==='Enter')submitCard()">
        <textarea class="inp" id="f-desc" placeholder="描述（可选）"></textarea>
        <div class="form-row">
          <select class="inp" id="f-type">
            <option value="feature">功能点</option>
            <option value="flow">用户路径</option>
            <option value="ui">界面/交互</option>
            <option value="data">数据结构</option>
            <option value="constraint">约束条件</option>
          </select>
          <button class="btn btn-primary" onclick="submitCard()" style="white-space:nowrap;">添加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panel-spec">
    <div class="panel-header"><span>AI Spec 预览</span></div>
    <div class="spec-body" id="spec-body">
      <div class="spec-placeholder">在左侧添加需求卡片<br>然后点击右上角 <strong>✦ Generate Spec</strong></div>
    </div>
  </div>

  <div class="panel-export">
    <div class="panel-header"><span>导出</span></div>
    <div class="export-body">
      <div>
        <div class="export-section">操作</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <button class="export-btn" onclick="copySpec()">
            <strong>复制 Spec MD</strong><small>直接粘给 Claude / Gemini</small>
          </button>
          <button class="export-btn" onclick="downloadSpec()">
            <strong>下载 .md 文件</strong><small>保存到本地</small>
          </button>
        </div>
      </div>
      <div>
        <div class="export-section">卡片统计</div>
        <div id="stats"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Wireframe Page ── -->
<div class="page" id="page-wf" style="flex-direction:column;">
  <div class="wf-toolbar">
    <button class="btn" onclick="wfClearSelected()">取消选择</button>
    <button class="btn" onclick="wfDeleteSelected()" style="color:var(--danger);border-color:var(--danger);">删除选中</button>
    <button class="btn" onclick="wfClear()" style="color:var(--text2);">清空画板</button>
    <span class="wf-hint">拖拽左侧组件到画板 · 选中后可移动/缩放 · 双击编辑标签 · Delete 删除</span>
    <button class="btn btn-primary" onclick="exportWireframe()" style="margin-left:8px;">导出 HTML</button>
    <button class="btn" onclick="copyWireframeAsText()">复制描述给 AI</button>
  </div>
  <div style="display:flex;flex:1;overflow:hidden;">
    <div class="wf-palette">
      <div class="wf-palette-label">布局</div>
      <div class="wf-item" draggable="true" data-type="header" data-w="560" data-h="52" data-label="Header">🗃 Header</div>
      <div class="wf-item" draggable="true" data-type="nav" data-w="560" data-h="40" data-label="Nav Bar">☰ Nav Bar</div>
      <div class="wf-item" draggable="true" data-type="sidebar" data-w="160" data-h="360" data-label="Sidebar">▐ Sidebar</div>
      <div class="wf-item" draggable="true" data-type="container" data-w="320" data-h="200" data-label="Container">□ Container</div>
      <div class="wf-palette-label" style="margin-top:6px;">组件</div>
      <div class="wf-item" draggable="true" data-type="button" data-w="100" data-h="34" data-label="Button">◉ Button</div>
      <div class="wf-item" draggable="true" data-type="input" data-w="200" data-h="34" data-label="Input...">▭ Input</div>
      <div class="wf-item" draggable="true" data-type="card" data-w="220" data-h="120" data-label="Card">▣ Card</div>
      <div class="wf-item" draggable="true" data-type="list" data-w="200" data-h="160" data-label="— Item\n— Item\n— Item">≡ List</div>
      <div class="wf-item" draggable="true" data-type="image" data-w="200" data-h="140" data-label="[ Image ]">🖼 Image</div>
      <div class="wf-item" draggable="true" data-type="text" data-w="180" data-h="32" data-label="Label">T Text</div>
      <div class="wf-item" draggable="true" data-type="modal" data-w="320" data-h="240" data-label="Modal">⊞ Modal</div>
    </div>
    <div class="wf-canvas-wrap" id="wf-canvas-wrap">
      <div class="wf-canvas" id="wf-canvas"></div>
    </div>
  </div>
</div>

<script src="/ui/app.js"></script>
</body>
</html>
